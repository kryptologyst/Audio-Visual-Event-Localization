# @package _global_

defaults:
  - model: av_event_localization
  - data: av_dataset
  - train: default
  - eval: av_metrics
  - _self_

# Experiment settings
experiment_name: "av_event_localization"
seed: 42
device: "auto"  # auto, cuda, mps, cpu

# Paths
data_dir: "data"
output_dir: "outputs"
checkpoint_dir: "checkpoints"
log_dir: "logs"

# Model settings
model:
  audio_encoder:
    type: "wav2vec2"
    pretrained: "facebook/wav2vec2-base"
    freeze_encoder: false
    
  visual_encoder:
    type: "resnet50"
    pretrained: true
    freeze_backbone: false
    
  fusion:
    type: "cross_attention"
    hidden_dim: 512
    num_heads: 8
    num_layers: 4
    
  temporal_encoder:
    type: "transformer"
    hidden_dim: 512
    num_heads: 8
    num_layers: 6
    
  event_classifier:
    num_classes: 10  # Number of event types
    dropout: 0.1

# Data settings
data:
  batch_size: 16
  num_workers: 4
  audio_sample_rate: 16000
  video_fps: 30
  max_audio_length: 10.0  # seconds
  max_video_length: 10.0  # seconds
  
  # Augmentation
  audio_augment:
    noise_factor: 0.1
    time_shift: 0.1
    
  video_augment:
    horizontal_flip: 0.5
    color_jitter: 0.1
    temporal_crop: 0.1

# Training settings
train:
  epochs: 100
  learning_rate: 1e-4
  weight_decay: 1e-5
  warmup_steps: 1000
  gradient_clip_val: 1.0
  
  # Loss weights
  loss_weights:
    classification: 1.0
    temporal_alignment: 0.5
    contrastive: 0.3
    
  # Optimization
  optimizer: "adamw"
  scheduler: "cosine"
  
  # Checkpointing
  save_every_n_epochs: 10
  monitor_metric: "val_f1"
  mode: "max"

# Evaluation settings
eval:
  metrics:
    - "accuracy"
    - "f1"
    - "precision"
    - "recall"
    - "temporal_iou"
    - "audio_visual_sync"
    
  # Temporal evaluation
  temporal_tolerance: 0.5  # seconds
  
  # Visualization
  save_predictions: true
  save_attention_maps: true
  num_samples_to_visualize: 10

# Logging
logging:
  level: "INFO"
  log_every_n_steps: 50
  log_images: true
  
# Safety and ethics
safety:
  content_filtering: true
  privacy_protection: true
  bias_detection: true
  
# Disclaimer
disclaimer: |
  This model is for research and educational purposes only.
  Not intended for surveillance or privacy-invasive applications.
  Users must comply with applicable privacy laws and regulations.
