# @package train

epochs: 100
learning_rate: 1e-4
weight_decay: 1e-5
warmup_steps: 1000
gradient_clip_val: 1.0

# Loss weights
loss_weights:
  classification: 1.0
  temporal_alignment: 0.5
  contrastive: 0.3

# Optimization
optimizer: "adamw"
scheduler: "cosine"

# Checkpointing
save_every_n_epochs: 10
monitor_metric: "val_f1"
mode: "max"
